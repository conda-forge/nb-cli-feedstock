context:
  version: "0.0.5"

package:
  name: nb-cli
  version: ${{ version }}

source:
  url: https://github.com/jupyter-ai-contrib/nb-cli/archive/v${{ version }}.tar.gz
  sha256: 6cd88f03d51ccb370d5554b3d90f6ccead8a1dcb95bbc390afff7a9c11ccad93

build:
  number: 0

requirements:
  build:
    - ${{ compiler('rust') }}
    - ${{ compiler('c') }}
    - ${{ stdlib('c') }}
    - cargo-bundle-licenses
    - cargo-auditable
    - pkg-config
  host:
    - openssl

tests:
  - script:
      - nb --help
      - nb --version

about:
  homepage: https://github.com/jupyter-ai-contrib/nb-cli
  repository: https://github.com/jupyter-ai-contrib/nb-cli
  license: BSD-3-Clause
  license_file:
    - LICENSE
    - THIRDPARTY.yml
  summary: "A command-line tool for reading, writing, and executing Jupyter notebooks"

extra:
  recipe-maintainers:
    - 3coins
    - andrii-i
    - ellisonbg
